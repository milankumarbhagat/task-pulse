<ion-button [type]="buttonType" [disabled]="disabled || loading" (click)="onClick()" [attr.name]="buttonName"
    [id]="id" [attr.class]="class" [expand]="'block'"
    [color]="variant === 'danger' ? 'danger' : (variant === 'secondary' ? 'medium' : 'primary')">
    {{label}}
    <ng-content></ng-content>
</ion-button>
