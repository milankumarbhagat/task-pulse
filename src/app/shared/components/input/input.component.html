<mat-form-field [appearance]="appearance" [ngClass]="classes" class="w-full">
  <mat-label>{{ label }}</mat-label>

  <ng-container *ngIf="inputType !== 'date'">
    <input matInput [type]="inputType === 'password' ? (hidePassword ? 'password' : 'text') : inputType" [id]="id"
      [formControl]="control" (blur)="handleBlurEvent($event)" [placeholder]="placeholder">
  </ng-container>

  <ng-container *ngIf="inputType === 'date'">
    <input matInput [matDatepicker]="picker" [id]="id" [formControl]="control" 
      (blur)="handleBlurEvent($event)" [placeholder]="placeholder">
    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker #picker></mat-datepicker>
  </ng-container>

  <mat-icon matPrefix *ngIf="icon">{{ icon }}</mat-icon>

  <button *ngIf="inputType === 'password'" mat-icon-button matSuffix (click)="togglePasswordVisibility()" type="button"
    [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hidePassword">
    <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
  </button>

  <mat-error *ngIf="control?.errors && (isSubmitted || control?.touched)">
    <span *ngIf="control?.errors?.['required']">Required</span>
    <ng-content></ng-content>
  </mat-error>
</mat-form-field>
