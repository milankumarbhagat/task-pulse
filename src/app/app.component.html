<div class="app-layout" [class.mobile-menu-open]="isMobileMenuOpen">
  
  <!-- Sidebar -->
  <aside class="sidebar" *ngIf="authService.currentUser$ | async as user">
    <div class="sidebar-header">
      <div class="nav-brand">
        <img [src]="logoUrl" alt="Logo" class="brand-logo" />
        <span class="brand-text">Task Pulse</span>
      </div>
      <div class="header-actions">
        <button class="theme-toggle-btn" (click)="themeService.toggleTheme()" [attr.aria-label]="(themeService.theme$ | async) === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'">
          <span class="material-icons">
            {{ (themeService.theme$ | async) === 'dark' ? 'light_mode' : 'dark_mode' }}
          </span>
        </button>
        <button class="mobile-close-btn" (click)="closeMobileMenu()">
          <span class="material-icons">close</span>
        </button>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <a href="javascript:void(0)" class="sidebar-item">
          <span class="material-icons">dashboard</span>
          <span>Dashboard</span>
        </a>
        <a routerLink="/task" routerLinkActive="active" class="sidebar-item">
          <span class="material-icons">task_alt</span>
          <span>My Tasks</span>
        </a>
        <a href="javascript:void(0)" routerLinkActive="active" class="sidebar-item">
          <span class="material-icons">calendar_today</span>
          <span>Calendar</span>
        </a>
        <a href="javascript:void(0)" class="sidebar-item">
          <span class="material-icons">inbox</span>
          <span>Inbox</span>
        </a>
        <a href="javascript:void(0)" class="sidebar-item">
          <span class="material-icons">analytics</span>
          <span>Analytics</span>
        </a>
        <a href="javascript:void(0)" class="sidebar-item">
          <span class="material-icons">settings</span>
          <span>Settings</span>
        </a>
      </div>

      <hr class="sidebar-divider" />

      <div class="nav-section">
        <label>My Lists</label>
        <a href="javascript:void(0)" class="sidebar-item">
          <span class="material-icons" style="color: #4f46e5;">folder</span>
          <span>Work</span>
        </a>
        <a href="javascript:void(0)" class="sidebar-item">
          <span class="material-icons" style="color: #ec4899;">folder</span>
          <span>Personal</span>
        </a>
        <a href="javascript:void(0)" class="sidebar-item">
          <span class="material-icons" style="color: #eab308;">folder</span>
          <span>Study</span>
        </a>
        <a href="javascript:void(0)" class="sidebar-item">
          <span class="material-icons" style="color: #10b981;">folder</span>
          <span>Health</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="user-profile" (click)="router.navigate(['/profile']); closeMobileMenu()">
        <img [src]="user.picture || 'https://ui-avatars.com/api/?name=' + user.firstName + '+' + user.lastName + '&background=6366f1&color=fff'" alt="User" />
        <div class="user-info">
          <span class="user-name">{{user.firstName}} {{user.lastName}}</span>
          <span class="user-badge">Premium</span>
        </div>
      </div>
      <button class="btn-sidebar-logout" (click)="authService.logout(); router.navigate(['/login']); closeMobileMenu()">
        <span class="material-icons">logout</span>
        <span>Log out</span>
      </button>
    </div>
  </aside>

  <!-- Main Content Wrapper -->
  <div class="main-wrapper" [class.full-width]="!(authService.currentUser$ | async)">
    <!-- Guest Nav (Top bar if not logged in) -->
    <header class="guest-header" *ngIf="!(authService.currentUser$ | async)">
      <div class="nav-brand">
        <img [src]="logoUrl" alt="Logo" class="brand-logo" />
        <span class="brand-text">Task Pulse</span>
      </div>
      <div class="auth-btns">
        <a routerLink="/login" class="btn-login">Login</a>
        <a routerLink="/sign-up" class="btn-signup">Sign Up</a>
      </div>
    </header>

    <!-- Mobile Header (Visible only on mobile when logged in) -->
    <header class="mobile-header" *ngIf="authService.currentUser$ | async">
      <button class="hamburger-btn" (click)="toggleMobileMenu()">
        <span class="material-icons">menu</span>
      </button>
      <span class="mobile-title">Task Pulse</span>
      <button class="theme-toggle-btn mobile-only" (click)="themeService.toggleTheme()">
        <span class="material-icons">
          {{ (themeService.theme$ | async) === 'dark' ? 'light_mode' : 'dark_mode' }}
        </span>
      </button>
    </header>

    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- Backdrop for mobile -->
  <div class="sidebar-backdrop" (click)="closeMobileMenu()"></div>
</div>

<div *ngIf="isLoading" class="loader-overlay">
  <div class="spinner"></div>
</div>
