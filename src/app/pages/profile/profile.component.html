<div class="profile-container">
    <div class="profile-card">
        <div class="profile-banner">
            <div class="banner-overlay"></div>
        </div>

        <div class="avatar-section">
            <div class="avatar-wrapper">
                <div class="avatar">
                    <img [src]="userPicture || 'https://ui-avatars.com/api/?name=' + profileForm.get('firstName')?.value + '+' + profileForm.get('lastName')?.value + '&background=4f46e5&color=fff&size=128'" 
                         alt="Profile" *ngIf="!isLoading">
                    <div class="avatar-placeholder" *ngIf="isLoading"></div>
                </div>
                <button class="edit-avatar-btn" title="Change Avatar">
                    <span class="material-icons">photo_camera</span>
                </button>
            </div>
        </div>

        <div class="profile-header">
            <h2>Your Profile</h2>
            <p>Manage your account settings and personal information</p>
        </div>

        <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
            <div class="form-section-title">Personal Information</div>
            <div class="profile-form-grid">
                <app-input label="First Name" inputType="text" name="firstName" controlName="firstName"
                    placeholder="First name" icon="person">
                </app-input>

                <app-input label="Last Name" inputType="text" name="lastName" controlName="lastName"
                    placeholder="Last name" icon="person_outline">
                </app-input>

                <app-input label="Gender" inputType="select" name="gender" controlName="gender"
                    placeholder="Select Gender" icon="wc" [options]="genderOptions">
                </app-input>

                <app-input label="Date of Birth" inputType="datepicker" name="dob" controlName="dob" placeholder="Select DOB"
                    icon="cake" [maxDate]="maxDobDate" class="dob-field">
                </app-input>
            </div>

            <div class="form-section-title">Contact & Professional</div>
            <div class="profile-form-grid">
                <div class="full-width">
                    <app-input label="Email address" inputType="email" name="email" controlName="email"
                        placeholder="Email address" icon="email">
                    </app-input>
                </div>

                <app-input label="Phone Number" inputType="tel" name="phone" controlName="phone"
                    placeholder="Phone number" icon="phone">
                </app-input>

                <app-input label="Occupation" inputType="text" name="occupation" controlName="occupation"
                    placeholder="e.g. Software Engineer" icon="work">
                </app-input>
            </div>

            <div class="actions">
                <button type="submit" class="btn-submit" [disabled]="isLoading || profileForm.invalid">
                    <span class="material-icons" style="margin-right: 8px;">save</span>
                    {{ isLoading ? 'Saving...' : 'Save Changes' }}
                </button>
            </div>
        </form>

    </div>
</div>
