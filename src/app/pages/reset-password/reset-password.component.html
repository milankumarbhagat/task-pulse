<div class="reset-container">
  <div class="reset-card">
    <div class="reset-header">
      <div class="icon-circle">
        <span class="material-icons">lock_open</span>
      </div>
      <h2>Reset Password</h2>
      <p>Choose a strong password to secure your account.</p>
    </div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="reset-form">
      <app-input label="New Password" inputType="password" id="password" controlName="password"
        placeholder="At least 8 characters" [isSubmitted]="isSubmitted" icon="lock" autocomplete="new-password">
        <span *ngIf="resetForm.get('password')?.errors?.['minlength']">
          Password must be at least 8 characters
        </span>
      </app-input>

      <app-input label="Confirm New Password" inputType="password" id="confirmPassword" controlName="confirmPassword"
        placeholder="Repeat your password" [isSubmitted]="isSubmitted" icon="lock_outline" autocomplete="new-password">
        <span *ngIf="resetForm.hasError('passwordMismatch') && isSubmitted">
          Passwords do not match
        </span>
      </app-input>

      <task-pulse-button buttonType="submit" name="submit-reset-btn" id="submit-reset-btn" class="btn-submit"
        [disabled]="isLoading">
        {{ isLoading ? 'Resetting...' : 'Reset Password' }}
      </task-pulse-button>
    </form>

    <div class="footer-links">
      <a routerLink="/login" class="back-link">
        <span class="material-icons">arrow_back</span>
        Back to Login
      </a>
    </div>
  </div>
</div>
