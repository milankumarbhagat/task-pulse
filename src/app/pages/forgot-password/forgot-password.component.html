<div class="forgot-container">
  <div class="forgot-card">
    <div class="forgot-header">
      <div class="icon-circle">
        <span class="material-icons">lock_reset</span>
      </div>
      <h2>Forgot Password?</h2>
      <p>No worries, we'll send you reset instructions.</p>
    </div>

    <div *ngIf="!emailSent; else successTemplate">
      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="forgot-form">
        <app-input label="Email Address" inputType="email" id="email" controlName="email" placeholder="Enter your email"
          [isSubmitted]="isSubmitted" icon="email">
          <span *ngIf="forgotForm.get('email')?.errors?.['email']">
            Please enter a valid email
          </span>
        </app-input>

        <task-pulse-button buttonType="submit" name="reset-btn" id="reset-btn" class="btn-submit"
          [disabled]="isLoading">
          {{ isLoading ? 'Sending...' : 'Send Reset Link' }}
        </task-pulse-button>
      </form>
    </div>

    <ng-template #successTemplate>
      <div class="success-content">
        <div class="success-icon">
          <span class="material-icons">mark_email_read</span>
        </div>
        <h3>Check your email</h3>
        <p>We've sent a password reset link to <strong>{{forgotForm.value.email}}</strong></p>
        <task-pulse-button label="Back to Login" name="back-to-login" routerLink="/login" variant="secondary"
          class="btn-back">
        </task-pulse-button>
      </div>
    </ng-template>

    <div class="footer-links">
      <a routerLink="/login" class="back-link">
        <span class="material-icons">arrow_back</span>
        Back to Login
      </a>
    </div>
  </div>
</div>
