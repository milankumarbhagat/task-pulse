<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h2>Welcome Back</h2>
      <p>Sign in to continue to {{appName}}</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <app-input label="Email Address" inputType="email" id="email" controlName="email" placeholder="Enter your email"
        [isSubmitted]="isSubmitted" icon="email">
        <span *ngIf="loginForm.get('email')?.errors?.['email']">
          Please enter a valid email
        </span>
      </app-input>

      <app-input label="Password" inputType="password" id="password" controlName="password"
        placeholder="Enter your password" [isSubmitted]="isSubmitted" icon="lock">
        <span *ngIf="loginForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters</span>
      </app-input>

      <div class="form-options">
        <a routerLink="/forgot-password" class="forgot-password">Forgot Password?</a>
      </div>

      <div *ngIf="errorMessage" class="error-message" style="text-align: center; margin-top: 0.5rem; font-weight: 500;">
        {{errorMessage}}
      </div>

      <task-pulse-button buttonType="submit" (myClicked)="onSubmit()" label="Login" name="login-btn"
        id="login-btn-1" class="btn-submit w-full" style="width: 100%; display: block;">
      </task-pulse-button>

    </form>

    <div class="divider">
      <span>Or continue with</span>
    </div>

    <div class="google-btn-wrapper">
      <div id="googleBtn"></div>
    </div>

    <p class="signup-prompt">
      Don't have an account? <a routerLink="/sign-up">Sign up</a>
    </p>
  </div>
</div>
