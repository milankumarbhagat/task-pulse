<div class="note-form-wrapper">
  <div class="form-header">
    <button mat-icon-button (click)="cancel()" class="back-btn" matTooltip="Back to Notes">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h1 class="page-title">{{ isEditMode ? 'Edit Note' : 'Create Note' }}</h1>
  </div>

  <mat-card class="form-card elevation-z3">
    <mat-card-content>
      <form [formGroup]="noteForm" (ngSubmit)="onSubmit()" class="note-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Title</mat-label>
          <input matInput formControlName="title" placeholder="Give your note a title...">
          <mat-error *ngIf="noteForm.get('title')?.hasError('required')">
            Title is required
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Category (Optional)</mat-label>
          <mat-select formControlName="category">
            <mat-option value="">None</mat-option>
            <mat-option *ngFor="let cat of categories" [value]="cat">
              {{ cat }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width note-textarea">
          <mat-label>Content</mat-label>
          <textarea matInput formControlName="content" placeholder="Write your thoughts here..." rows="12"></textarea>
          <mat-error *ngIf="noteForm.get('content')?.hasError('required')">
            Content is required
          </mat-error>
        </mat-form-field>

        <div class="form-actions">
          <button mat-button type="button" (click)="cancel()" class="cancel-btn">Cancel</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="noteForm.invalid" class="submit-btn">
            <mat-icon>{{ isEditMode ? 'save' : 'add_task' }}</mat-icon>
            {{ isEditMode ? 'Update Note' : 'Create Note' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
